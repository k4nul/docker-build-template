name: Docker Publish Example

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Push after the no-push Buildx plan artifact is captured."
        required: true
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

env:
  CONFIG_FILE: config/image.env.example
  BAKE_PLAN_OUTPUT: out/no-push-bake-plan.json
  PLATFORMS: linux/amd64,linux/arm64
  PUSH: "false"
  SBOM: "true"
  PROVENANCE: mode=min

jobs:
  no-push-plan:
    name: Capture no-push plan
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve public image metadata
        shell: bash
        run: |
          image_ref="ghcr.io/${GITHUB_REPOSITORY,,}"
          {
            echo "REGISTRY=${image_ref%/*}/"
            echo "IMAGE_NAME=${image_ref##*/}"
            echo "IMAGE_TAG=${GITHUB_SHA}"
            echo "OCI_SOURCE=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}"
            echo "OCI_REVISION=${GITHUB_SHA}"
          } >> "$GITHUB_ENV"

      - name: Validate no-push Buildx plan
        run: |
          mkdir -p out
          ./scripts/validate-build-plan.sh

      - name: Upload no-push review artifact
        uses: actions/upload-artifact@v4
        with:
          name: no-push-bake-plan
          path: out/no-push-bake-plan.json

  publish:
    name: Publish through validated wrapper
    needs: no-push-plan
    if: ${{ github.event.inputs.publish == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Resolve public image metadata
        shell: bash
        run: |
          image_ref="ghcr.io/${GITHUB_REPOSITORY,,}"
          {
            echo "REGISTRY=${image_ref%/*}/"
            echo "IMAGE_NAME=${image_ref##*/}"
            echo "IMAGE_TAG=${GITHUB_SHA}"
            echo "OCI_SOURCE=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}"
            echo "OCI_REVISION=${GITHUB_SHA}"
          } >> "$GITHUB_ENV"

      - name: Publish image
        run: |
          mkdir -p out
          ./scripts/push-image.sh

      - name: Upload publish validation artifact
        uses: actions/upload-artifact@v4
        with:
          name: publish-no-push-bake-plan
          path: out/no-push-bake-plan.json
